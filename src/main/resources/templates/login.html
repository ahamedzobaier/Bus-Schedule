<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UU Bus - Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img th:src="@{/bluelogo.png}" alt="Uttara University Logo" class="login-logo">
                <h3>Transport Management System</h3>
                <p>Login to access your dashboard</p>
            </div>

            <div th:if="${error}" class="error-box">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email or University ID</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" name="emailOrId" placeholder="Enter your ID" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">SIGN IN</button>
            </form>

            <div class="login-footer">
                <p>New here? <a href="/signup">Create an Account</a></p>
                <a href="/forgot-password" class="forgot-pass">Forgot Password?</a>
            </div>
        </div>

        <div class="copyright">
            &copy; 2026 Uttara University. All rights reserved.
        </div>
    </div>

</body>

</html>
