<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UU Bus - Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/forgot-password.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="recovery-page">

    <div class="recovery-container">
        <div class="recovery-card">
            <div class="recovery-header">
                <div class="icon-circle">
                    <i class="fas fa-key"></i>
                </div>
                <h3>Forgot Password?</h3>
                <p>Enter your University ID or Email and we'll send you a link to reset your password.</p>
            </div>

            <div th:if="${message}" class="success-box">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}">Reset link sent successfully!</span>
            </div>

            <div th:if="${error}" class="error-box">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label>University ID or Email</label>
                    <div class="input-icon">
                        <i class="fas fa-paper-plane"></i>
                        <input type="text" name="emailOrId" placeholder="Enter your registered ID" required>
                    </div>
                </div>

                <button type="submit" class="btn-recovery">SEND RESET LINK</button>
            </form>

            <div class="recovery-footer">
                <a href="/login" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>

        <div class="copyright">
            &copy; 2026 Uttara University. All rights reserved.
        </div>
    </div>

</body>

</html>
